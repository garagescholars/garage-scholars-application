<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phone Verification</title>
  <style>
    body { margin:0; background:#0f1b2d; color:#f8fafc; font-family:sans-serif;
           display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:16px; }
    #status { text-align:center; font-size:14px; margin-bottom:12px; }
    #recaptcha-container { display:flex; justify-content:center; transform:scale(0.9); transform-origin:center; }
    .error { color:#ef4444; font-size:13px; }
    .spinner { border:3px solid #1e293b; border-top:3px solid #14b8a6; border-radius:50%;
               width:24px; height:24px; animation:spin .8s linear infinite; margin:8px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #sending { display:none; text-align:center; margin-top:12px; }
    #sending.visible { display:block; }
  </style>
</head>
<body>
  <div id="status">Tap the checkbox to verify</div>
  <div id="recaptcha-container"></div>
  <div id="sending">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#94a3b8;">Sending code...</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script>
    var config = {
      apiKey: "AIzaSyBPOosKjdOrj1dMLmgs1bH2Z9FoqqrZQI8",
      authDomain: "garage-scholars-v2.firebaseapp.com",
      projectId: "garage-scholars-v2"
    };

    var params = new URLSearchParams(window.location.search);
    var phone = params.get('phone');

    if (!phone) {
      postMsg('error', 'No phone number provided.');
    } else {
      firebase.initializeApp(config);
      var auth = firebase.auth();
      auth.useDeviceLanguage();
      setupRecaptcha();
    }

    function postMsg(type, message, extra) {
      var data = { type: type, message: message };
      if (extra) { for (var k in extra) data[k] = extra[k]; }
      try {
        window.ReactNativeWebView.postMessage(JSON.stringify(data));
      } catch(e) {
        document.getElementById('status').innerHTML =
          '<p class="error">' + (message || 'Error') + '</p>';
      }
    }

    function setupRecaptcha() {
      try {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          size: 'normal',
          theme: 'dark',
          callback: function(response) {
            // User solved reCAPTCHA — now send the code
            document.getElementById('status').textContent = 'Verified! Sending code...';
            document.getElementById('sending').className = 'visible';
            sendCode();
          },
          'expired-callback': function() {
            postMsg('error', 'reCAPTCHA expired. Please try again.');
          }
        });

        window.recaptchaVerifier.render().then(function(widgetId) {
          window.recaptchaWidgetId = widgetId;
        }).catch(function(err) {
          postMsg('error', 'Failed to load reCAPTCHA: ' + (err.message || err));
        });
      } catch (e) {
        postMsg('error', 'Failed to initialize: ' + (e.message || e));
      }
    }

    function sendCode() {
      auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
        .then(function(confirmationResult) {
          postMsg('verificationId', '', {
            verificationId: confirmationResult.verificationId
          });
        })
        .catch(function(error) {
          var msg = error.message || 'Failed to send verification code.';
          if (error.code === 'auth/too-many-requests') {
            msg = 'Too many attempts. Please wait a few minutes and try again.';
          } else if (error.code === 'auth/invalid-phone-number') {
            msg = 'Invalid phone number format.';
          } else if (error.code === 'auth/captcha-check-failed') {
            msg = 'reCAPTCHA verification failed. Please try again.';
          }
          postMsg('error', msg);
        });
    }
  </script>
</body>
</html>
